<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Hotel</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <h1> Hotel</h1>

        <button onclick="modalQuarto.classList.remove('oculto')">
            Adicionar Quarto
        </button>

    </header>

    <div class="container">

        <aside>

            <h2>Menu Principal</h2>

            <button onclick="carregarQuartos()">
                Acomodações
            </button>

            <button onclick="window.location.href='reservas.html'">
                Reservas
            </button>

        </aside>

        <main id="listaQuartos"></main>

    </div>

    <!-- Modal Cadastro de Quarto -->
    <div id="modalQuarto" class="modal oculto">

        <div class="janela">

            <h2>Cadastro de Acomodação</h2>

            <form id="formQuarto">

                <label>Número da Acomodação</label>
                <input type="text" id="numero" required>

                <label>Categoria</label>
                <input type="text" id="tipo" required>

                <br><br>

                <button type="button" onclick="modalQuarto.classList.add('oculto')">
                    Cancelar
                </button>

                <button type="submit">
                    Salvar
                </button>

            </form>

        </div>

    </div>

    <!-- Modal Lista de Reservas -->
    <div id="modalReservas" class="modal oculto">

        <div class="janela janelaGrande">

            <h2 id="tituloQuarto"></h2>

            <p id="infoQuarto"></p>

            <button onclick="abrirCadastroReserva()">
                Registrar Reserva
            </button>

            <br><br>

            <table>

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Hóspede</th>
                        <th>Check-in</th>
                        <th>Check-out</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="listaReservas"></tbody>

            </table>

            <br>

            <button onclick="modalReservas.classList.add('oculto')">
                Fechar
            </button>

        </div>

    </div>

    <!-- Modal Cadastro Reserva -->
    <div id="modalReserva" class="modal oculto">

        <div class="janela">

            <h2>Nova Reserva</h2>

            <form id="formReserva">

                <label>Nome do Hóspede</label>
                <input type="text" id="hospede" required>

                <label>Data de Check-in</label>
                <input type="date" id="dataEntrada" required>

                <label>Data de Check-out</label>
                <input type="date" id="dataSaida" required>

                <br><br>

                <button type="button" onclick="modalReserva.classList.add('oculto')">
                    Cancelar
                </button>

                <button type="submit">
                    Salvar Reserva
                </button>

            </form>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
